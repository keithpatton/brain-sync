name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - run: uv pip install --system -e ".[dev,google]"
      - run: ruff check
      - run: pyright

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@v7
      - run: uv pip install --system -e ".[dev]"
      - name: Fast tests (unit/integration/external/mcp)
        run: python -m pytest -n auto -m "unit or integration or external or mcp" --timeout=30 -v
      - name: Slow tests (system/e2e)
        run: python -m pytest -n auto -m "system or e2e" --timeout=120 -v
